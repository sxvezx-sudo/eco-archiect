<a class="proj-card proj-card--vertical" href="{{url}}">
  <div class="proj-card-img">
    <img src="{{image}}" alt="{{title}}" loading="lazy">
  </div>
  <div class="card-name">
    <div class="ico-outline" aria-hidden="true"></div> 
    <h3 class="card-name-text">{{title}}</h3>          
  </div>
  <p class="card-loc">{{location}}</p>
</a>
